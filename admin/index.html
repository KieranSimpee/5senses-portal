<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Admin · 5SENSES</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #f4f2fb; min-height: 100vh; }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      position: fixed; inset: 0; z-index: 999;
      background: #f4f2fb;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-box {
      background: #fff; border-radius: 16px; padding: 40px 32px;
      box-shadow: 0 4px 32px rgba(140,130,200,0.12);
      text-align: center; width: 320px;
    }
    .auth-box h2 { font-size: 18px; color: #2a2040; margin-bottom: 8px; }
    .auth-box p  { font-size: 12px; color: #9080b0; margin-bottom: 24px; }
    .auth-box input {
      width: 100%; padding: 12px 16px; border: 1px solid #ddd8f0;
      border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none;
    }
    .auth-box input:focus { border-color: #8c82fc; }
    .btn-primary {
      width: 100%; padding: 12px; background: #8c82fc; color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #5e50fb; }
    .auth-error { font-size: 12px; color: #e05; margin-top: 8px; display: none; }

    /* ── ADMIN SHELL ── */
    #admin-shell { display: none; flex-direction: column; height: 100vh; }

    /* TOP BAR */
    .top-bar {
      background: #fff;
      border-bottom: 1px solid #e8e4f8;
      padding: 0 24px;
      display: flex; align-items: center; gap: 8px;
      height: 48px; flex-shrink: 0;
    }
    .top-bar-title { font-size: 13px; font-weight: 600; color: #5e50fb; letter-spacing: 1px; }
    .top-bar-sub   { font-size: 11px; color: #b0a0d0; }

    /* ── 3-COLUMN CONTROL PANEL ── */
    .control-panel {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 2px solid #e8e4f8;
      background: #fff;
      flex-shrink: 0;
    }
    .cp-col {
      padding: 20px 22px;
      border-right: 1px solid #e8e4f8;
    }
    .cp-col:last-child { border-right: none; }
    .cp-col-title {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #8c82fc;
      margin-bottom: 14px;
    }

    /* form elements */
    label { font-size: 11px; color: #7060a0; display: block; margin-bottom: 4px; margin-top: 10px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], input[type=url], input[type=color], select {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd8f0;
      border-radius: 8px; font-size: 12px; font-family: 'Montserrat', sans-serif;
      outline: none; transition: border 0.2s;
    }
    input[type=text]:focus, input[type=url]:focus, select:focus { border-color: #8c82fc; }
    input[type=color] { height: 36px; padding: 2px 4px; cursor: pointer; }

    .color-row { display: flex; gap: 8px; align-items: center; }
    .color-row input[type=color] { width: 36px; flex-shrink: 0; }
    .color-row input[type=text]  { flex: 1; }

    /* save / ok buttons */
    .btn-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn-save {
      flex: 1; padding: 10px; background: #8c82fc; color: #fff;
      border: none; border-radius: 9px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: #5e50fb; }
    .btn-ok {
      padding: 10px 16px; background: #f0eeff; color: #5e50fb;
      border: 1px solid #c8c0f8; border-radius: 9px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-ok:hover { background: #e0d8ff; }
    .save-status { font-size: 11px; color: #5e50fb; margin-top: 6px; display: none; text-align: center; }

    /* logo upload preview */
    .logo-preview-row { display: flex; gap: 12px; margin-top: 10px; }
    .logo-thumb {
      width: 80px; height: 48px; border: 1px dashed #c8c0f8;
      border-radius: 8px; object-fit: contain; background: #faf9ff;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .logo-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }

    /* ── PREVIEW AREA ── */
    .preview-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-label {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 2px; color: rgba(120,100,180,0.5);
      text-transform: uppercase; pointer-events: none; z-index: 10;
    }

    /* watercolour blobs inside preview */
    .wc-canvas {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .wc-blob { position: absolute; border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%; filter: blur(50px); animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
    .wc-blob-1 { width: 55%; height: 55%; top: 5%; left: -5%; background: radial-gradient(ellipse at 40% 50%, rgba(255,190,160,0.70) 0%, rgba(255,170,140,0.40) 45%, transparent 100%); animation: wc1 20s ease-in-out infinite; }
    .wc-blob-2 { width: 50%; height: 50%; top: 15%; left: 25%; background: radial-gradient(ellipse at 50% 50%, rgba(210,140,170,0.60) 0%, rgba(200,130,165,0.32) 48%, transparent 100%); border-radius: 55% 45% 60% 40% / 52% 48% 55% 45%; animation: wc2 25s ease-in-out infinite; }
    .wc-blob-3 { width: 52%; height: 52%; top: 5%; right: -8%; background: radial-gradient(ellipse at 60% 45%, rgba(180,175,230,0.65) 0%, rgba(165,160,220,0.35) 45%, transparent 100%); border-radius: 45% 55% 42% 58% / 55% 45% 58% 42%; animation: wc3 22s ease-in-out infinite; }
    @keyframes wc1 { 0%{transform:translate(0,0) scale(1);opacity:.80} 25%{transform:translate(3%,-4%) scale(1.06);opacity:.90} 50%{transform:translate(-2%,5%) scale(.96);opacity:.72} 75%{transform:translate(4%,2%) scale(1.03);opacity:.85} 100%{transform:translate(0,0) scale(1);opacity:.80} }
    @keyframes wc2 { 0%{transform:translate(0,0) scale(1);opacity:.72} 33%{transform:translate(-4%,3%) scale(1.08);opacity:.82} 66%{transform:translate(3%,-5%) scale(.94);opacity:.62} 100%{transform:translate(0,0) scale(1);opacity:.72} }
    @keyframes wc3 { 0%{transform:translate(0,0) scale(1);opacity:.75} 35%{transform:translate(-3%,-3%) scale(1.05);opacity:.85} 70%{transform:translate(4%,4%) scale(.97);opacity:.65} 100%{transform:translate(0,0) scale(1);opacity:.75} }

    /* mini portal card inside preview */
    .preview-card {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(180,160,220,0.25);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      padding: 32px 40px;
      text-align: center;
      min-width: 280px;
    }
    .preview-logo-row {
      display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px;
    }
    .preview-logo-row img { height: 44px; object-fit: contain; mix-blend-mode: multiply; }
    .preview-divider { width: 1px; height: 36px; background: rgba(160,140,200,0.30); }
    .preview-tagline { font-size: 9px; letter-spacing: 3px; color: #a090b8; text-transform: uppercase; margin-bottom: 20px; }
    .preview-btn {
      display: block; width: 100%; padding: 12px;
      background: rgba(255,255,255,0.70); border: 1px solid rgba(180,160,220,0.25);
      border-radius: 12px; font-size: 12px; font-weight: 500; color: #2a2040;
      margin-bottom: 8px; text-align: left; padding-left: 16px;
    }
    .preview-btn:last-child { margin-bottom: 0; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>Portal Admin</h2>
    <p>Enter your admin password to continue</p>
    <input type="password" id="auth-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkAuth()" />
    <button class="btn-primary" onclick="checkAuth()">Enter</button>
    <div class="auth-error" id="auth-error">Incorrect password</div>
  </div>
</div>

<!-- ADMIN SHELL -->
<div id="admin-shell">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="top-bar-title">PORTAL ADMIN</span>
    <span class="top-bar-sub">· portal.5senses.global</span>
  </div>

  <!-- 3-COLUMN CONTROL PANEL (Kieran's sketch) -->
  <div class="control-panel">

    <!-- COL 1: BRAND -->
    <div class="cp-col">
      <div class="cp-col-title">Brand</div>

      <label>5SENSES Logo URL</label>
      <input type="url" id="logo5s" placeholder="https://..." oninput="updatePreview()" />

      <label>SIMPLEX-ITY Logo URL</label>
      <input type="url" id="logoSx" placeholder="https://..." oninput="updatePreview()" />

      <label>Preview</label>
      <div class="logo-preview-row">
        <div class="logo-thumb"><img id="prev-logo5s" src="/assets/5senses_logo.png" /></div>
        <div class="logo-thumb"><img id="prev-logoSx" src="/assets/simplex_ity_logo.png" /></div>
      </div>

      <label>Tagline Text</label>
      <input type="text" id="tagline" value="Portal — Select Your Access" oninput="updatePreview()" />
    </div>

    <!-- COL 2: CONTENT / STYLE -->
    <div class="cp-col">
      <div class="cp-col-title">Content · Style</div>

      <label>Font</label>
      <select id="font-choice" onchange="updatePreview()">
        <option value="Montserrat">Montserrat</option>
        <option value="Exo 2">Exo 2</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Raleway">Raleway</option>
        <option value="Lato">Lato</option>
      </select>

      <label>Accent Colour</label>
      <div class="color-row">
        <input type="color" id="accent-color" value="#8c82fc" oninput="syncColor('accent-color','accent-hex')" />
        <input type="text"  id="accent-hex"   value="#8c82fc" oninput="syncHex('accent-hex','accent-color')" maxlength="7" />
      </div>

      <label>Card Text Colour</label>
      <div class="color-row">
        <input type="color" id="text-color" value="#2a2040" oninput="syncColor('text-color','text-hex')" />
        <input type="text"  id="text-hex"   value="#2a2040" oninput="syncHex('text-hex','text-color')" maxlength="7" />
      </div>

      <label>Footer Text</label>
      <input type="text" id="footer-text" value="5SENSESBEAUTY LIMITED · SIMPLEX-ITY · Powered by Simpee" oninput="updatePreview()" />
    </div>

    <!-- COL 3: BACKGROUND + SAVE -->
    <div class="cp-col">
      <div class="cp-col-title">Background</div>

      <label>Style</label>
      <select id="bg-style" onchange="updatePreview()">
        <option value="watercolour">Watercolour Animation</option>
        <option value="gradient">Gradient</option>
        <option value="solid">Solid Colour</option>
        <option value="image">Image URL</option>
      </select>

      <div id="bg-gradient-opts">
        <label>From Colour</label>
        <div class="color-row">
          <input type="color" id="bg-from" value="#f0eeff" oninput="syncColor('bg-from','bg-from-hex')" />
          <input type="text"  id="bg-from-hex" value="#f0eeff" oninput="syncHex('bg-from-hex','bg-from')" maxlength="7" />
        </div>
        <label>To Colour</label>
        <div class="color-row">
          <input type="color" id="bg-to" value="#fce8ff" oninput="syncColor('bg-to','bg-to-hex')" />
          <input type="text"  id="bg-to-hex" value="#fce8ff" oninput="syncHex('bg-to-hex','bg-to')" maxlength="7" />
        </div>
      </div>

      <div id="bg-image-opt" style="display:none">
        <label>Image URL</label>
        <input type="url" id="bg-image-url" placeholder="https://..." oninput="updatePreview()" />
      </div>

      <div id="bg-solid-opt" style="display:none">
        <label>Colour</label>
        <div class="color-row">
          <input type="color" id="bg-solid" value="#f0eeff" oninput="syncColor('bg-solid','bg-solid-hex')" />
          <input type="text"  id="bg-solid-hex" value="#f0eeff" oninput="syncHex('bg-solid-hex','bg-solid')" maxlength="7" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-save" onclick="saveSettings()">Save</button>
        <button class="btn-ok" onclick="window.open('/', '_blank')">OK</button>
      </div>
      <div class="save-status" id="save-status">✓ Saved! Changes live on portal.</div>
    </div>

  </div><!-- end control-panel -->

  <!-- LIVE PREVIEW -->
  <div class="preview-area" id="preview-area">
    <div class="wc-canvas" id="preview-wc">
      <div class="wc-blob wc-blob-1"></div>
      <div class="wc-blob wc-blob-2"></div>
      <div class="wc-blob wc-blob-3"></div>
    </div>
    <span class="preview-label">Live Preview</span>
    <div class="preview-card" id="preview-card">
      <div class="preview-logo-row">
        <img id="preview-card-logo5s" src="/assets/5senses_logo.png" alt="5SENSES" />
        <div class="preview-divider"></div>
        <img id="preview-card-logoSx" src="/assets/simplex_ity_logo.png" alt="SIMPLEX-ITY" />
      </div>
      <div class="preview-tagline" id="preview-tagline-text">PORTAL — SELECT YOUR ACCESS</div>
      <div class="preview-btn">Staff Portal ›</div>
      <div class="preview-btn">Brand Portal ›</div>
      <div class="preview-btn">Influencer Portal ›</div>
    </div>
  </div>

</div><!-- end admin-shell -->

<script>
const STORAGE_KEY = 'portal_5senses_settings';
const PASS = 'simpee2026';

function checkAuth() {
  if (document.getElementById('auth-input').value === PASS) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('admin-shell').style.display = 'flex';
    loadSettings();
  } else {
    document.getElementById('auth-error').style.display = 'block';
  }
}

function syncColor(colorId, hexId) {
  document.getElementById(hexId).value = document.getElementById(colorId).value;
  updatePreview();
}
function syncHex(hexId, colorId) {
  const v = document.getElementById(hexId).value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    document.getElementById(colorId).value = v;
    updatePreview();
  }
}

document.getElementById('bg-style').addEventListener('change', function() {
  const v = this.value;
  document.getElementById('bg-gradient-opts').style.display = (v === 'gradient') ? 'block' : 'none';
  document.getElementById('bg-image-opt').style.display    = (v === 'image')    ? 'block' : 'none';
  document.getElementById('bg-solid-opt').style.display   = (v === 'solid')    ? 'block' : 'none';
  updatePreview();
});

function updatePreview() {
  const bgStyle = document.getElementById('bg-style').value;
  const pa = document.getElementById('preview-area');
  const wc = document.getElementById('preview-wc');

  // background
  if (bgStyle === 'watercolour') {
    pa.style.background = '#ffffff';
    wc.style.display = 'block';
  } else if (bgStyle === 'gradient') {
    const f = document.getElementById('bg-from').value;
    const t = document.getElementById('bg-to').value;
    pa.style.background = `linear-gradient(135deg, ${f}, ${t})`;
    wc.style.display = 'none';
  } else if (bgStyle === 'solid') {
    pa.style.background = document.getElementById('bg-solid').value;
    wc.style.display = 'none';
  } else if (bgStyle === 'image') {
    const url = document.getElementById('bg-image-url').value;
    pa.style.background = url ? `url(${url}) center/cover` : '#ffffff';
    wc.style.display = 'none';
  }

  // logos
  const l5 = document.getElementById('logo5s').value;
  const lx = document.getElementById('logoSx').value;
  if (l5) { document.getElementById('prev-logo5s').src = l5; document.getElementById('preview-card-logo5s').src = l5; }
  if (lx) { document.getElementById('prev-logoSx').src = lx; document.getElementById('preview-card-logoSx').src = lx; }

  // tagline
  const tl = document.getElementById('tagline').value;
  document.getElementById('preview-tagline-text').textContent = tl.toUpperCase();

  // accent colour on preview buttons
  const acc = document.getElementById('accent-color').value;
  document.querySelectorAll('.preview-btn').forEach(b => b.style.borderColor = acc + '55');
}

function saveSettings() {
  const s = {
    logo5s_url:      document.getElementById('logo5s').value,
    logoSx_url:      document.getElementById('logoSx').value,
    tagline:         document.getElementById('tagline').value,
    font:            document.getElementById('font-choice').value,
    accent_color:    document.getElementById('accent-color').value,
    text_color:      document.getElementById('text-color').value,
    footer_text:     document.getElementById('footer-text').value,
    bg_style:        document.getElementById('bg-style').value,
    bg_gradient_from: document.getElementById('bg-from').value,
    bg_gradient_to:  document.getElementById('bg-to').value,
    bg_image_url:    document.getElementById('bg-image-url').value,
    bg_solid:        document.getElementById('bg-solid').value,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  const st = document.getElementById('save-status');
  st.style.display = 'block';
  setTimeout(() => st.style.display = 'none', 3000);
}

function loadSettings() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (!stored) return;
  try {
    const s = JSON.parse(stored);
    if (s.logo5s_url)        document.getElementById('logo5s').value = s.logo5s_url;
    if (s.logoSx_url)        document.getElementById('logoSx').value = s.logoSx_url;
    if (s.tagline)           document.getElementById('tagline').value = s.tagline;
    if (s.font)              document.getElementById('font-choice').value = s.font;
    if (s.accent_color)      { document.getElementById('accent-color').value = s.accent_color; document.getElementById('accent-hex').value = s.accent_color; }
    if (s.text_color)        { document.getElementById('text-color').value  = s.text_color;   document.getElementById('text-hex').value  = s.text_color;   }
    if (s.footer_text)       document.getElementById('footer-text').value = s.footer_text;
    if (s.bg_style)          { document.getElementById('bg-style').value = s.bg_style; document.getElementById('bg-style').dispatchEvent(new Event('change')); }
    if (s.bg_gradient_from)  { document.getElementById('bg-from').value = s.bg_gradient_from; document.getElementById('bg-from-hex').value = s.bg_gradient_from; }
    if (s.bg_gradient_to)    { document.getElementById('bg-to').value   = s.bg_gradient_to;   document.getElementById('bg-to-hex').value   = s.bg_gradient_to;   }
    if (s.bg_image_url)      document.getElementById('bg-image-url').value = s.bg_image_url;
    if (s.bg_solid)          { document.getElementById('bg-solid').value = s.bg_solid; document.getElementById('bg-solid-hex').value = s.bg_solid; }
    updatePreview();
  } catch(e) {}
}
</script>
</body>
</html>
