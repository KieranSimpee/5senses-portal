  input[type=text]:focus{border-color:#8c82fc}
  select{padding:8px 14px;border:1.5px solid #e8e6fe;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;background:#fff;cursor:pointer;outline:none}
  .table-wrap{background:#fff;border:1.5px solid #e8e6fe;border-radius:16px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead tr{background:#f5f4ff}
  th{padding:11px 16px;text-align:left;font-size:10px;font-weight:700;color:#bab4fd;letter-spacing:1.5px;text-transform:uppercase}
  td{padding:12px 16px;font-size:13px;border-top:1px solid #f0efff;vertical-align:middle}
  tr:hover td{background:#faf9ff}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700}
  .badge.paid{background:#dcfce7;color:#16a34a}
  .badge.pending{background:#fef9c3;color:#ca8a04}
  .badge.overdue{background:#fee2e2;color:#dc2626}
  .cat-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;background:#e8e6fe;color:#5e50fb}
  .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .doc-card{background:#fff;border:1.5px solid #e8e6fe;border-radius:16px;padding:16px;transition:all 0.2s}
  .doc-card:hover{border-color:#bab4fd;box-shadow:0 4px 20px rgba(140,130,252,0.1)}
  .doc-icon{width:40px;height:40px;border-radius:12px;background:#e8e6fe;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
  .doc-title{font-weight:700;font-size:13px;color:#1a1a1f;margin-bottom:6px;line-height:1.4}
  .doc-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#8c82fc;font-weight:700;text-decoration:none;margin-top:10px;padding:5px 12px;background:#e8e6fe;border-radius:8px}

  .section-hidden{display:none}

function renderExp(data) {
  const tbody = document.getElementById('exp-tbody');
  tbody.innerHTML = data.map(e => `
    <tr>
      <td><span style="font-weight:600">${e.title}</span></td>
      <td class="vendor">${e.vendor}</td>
      <td style="color:#6b7280;font-size:12px">${e.date}</td>
      <td><span class="cat-badge">${e.category}</span></td>
      <td class="amount">${e.currency} ${e.amount.toLocaleString()}</td>
      <td><span class="badge ${e.status}">${e.status}</span></td>
    </tr>`).join('');
}

function filterExp() {
  const q = document.getElementById('exp-search').value.toLowerCase();
  const cat = document.getElementById('exp-cat').value;
  const status = document.getElementById('exp-status').value;
  renderExp(expenses.filter(e =>
    (!q || e.title.toLowerCase().includes(q) || e.vendor.toLowerCase().includes(q)) &&
    (!cat || e.category === cat) &&
    (!status || e.status === status)
  ));
}

function renderDocs(data) {
  document.getElementById('doc-grid').innerHTML = data.map(d => `
    <div class="doc-card">
      <div class="doc-icon">${catIcons[d.category]||'📁'}</div>
      <div class="doc-title">${d.title}</div>
      <span class="cat-badge">${d.category}</span>
      ${d.url ? `<br><a class="doc-link" href="${d.url}" target="_blank">📂 Open File ↗</a>` : '<br><span style="font-size:11px;color:#bab4fd;margin-top:8px;display:block">No file link</span>'}
    </div>`).join('');
}

function filterDocs() {
  const q = document.getElementById('doc-search').value.toLowerCase();
  const cat = document.getElementById('doc-cat').value;
  renderDocs(documents.filter(d =>
    (!q || d.title.toLowerCase().includes(q)) &&
    (!cat || d.category === cat)
  ));
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-expenses').classList.toggle('section-hidden', tab !== 'expenses');
  document.getElementById('tab-docs').classList.toggle('section-hidden', tab !== 'docs');
}

renderExp(expenses);
renderDocs(documents);
</script>
</body>
