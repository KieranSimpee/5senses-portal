<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5Senses Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
    }



    .portal-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .portal-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(94,80,251,0.08);
    }
    .portal-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(94,80,251,0.18);
    }
    .portal-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .portal-icon svg { width: 26px; height: 26px; }
    .staff-icon { background: #ede9ff; }
    .brand-icon { background: #e9f0ff; }
    .influencer-icon { background: #fce9ff; }
    .portal-info h2 {
      font-family: 'Exo 2', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1f;
      margin-bottom: 3px;
    }
    .portal-info p {
      font-size: 13px;
      color: #8888a0;
    }
    .portal-arrow {
      margin-left: auto;
      color: #c0b8ff;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #aaaacc;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }
    .logo-5senses-img {
      mix-blend-mode: multiply;
      height: 120px;
      width: auto;
      object-fit: contain;
    }
    .logo-divider {
      width: 1px;
      height: 110px;
      background: #d0cce8;
      flex-shrink: 0;
    }
    .logo-simplexity {
      mix-blend-mode: multiply;
      height: 100px;
      width: auto;
      object-fit: contain;
    }
    .portal-tagline {
      font-size: 12px;
      color: #9085a5;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
    }
  
    /* ── WATERCOLOUR BACKGROUND ── */
    body { animation: bg-colour-shift 20s ease-in-out infinite; }
    .wc-canvas {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .wc-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      mix-blend-mode: multiply;
    }
    .wc-blob-1 {
      width: 70vw; height: 70vw;
      top: -20%; left: -15%;
      background: radial-gradient(circle, rgba(180,160,252,0.55) 0%, rgba(200,180,255,0.25) 60%, transparent 100%);
      animation: watercolour-drift 18s ease-in-out infinite;
    }
    .wc-blob-2 {
      width: 60vw; height: 60vw;
      top: 20%; right: -20%;
      background: radial-gradient(circle, rgba(160,200,255,0.50) 0%, rgba(180,220,255,0.22) 60%, transparent 100%);
      animation: watercolour-drift-2 22s ease-in-out infinite;
    }
    .wc-blob-3 {
      width: 55vw; height: 55vw;
      bottom: -15%; left: 20%;
      background: radial-gradient(circle, rgba(230,160,255,0.45) 0%, rgba(255,180,230,0.20) 60%, transparent 100%);
      animation: watercolour-drift-3 26s ease-in-out infinite;
    }
    .wc-blob-4 {
      width: 40vw; height: 40vw;
      top: 40%; left: 30%;
      background: radial-gradient(circle, rgba(200,230,200,0.35) 0%, rgba(180,255,200,0.15) 60%, transparent 100%);
      animation: watercolour-drift 30s ease-in-out infinite reverse;
    }
    .wc-blob-5 {
      width: 50vw; height: 50vw;
      top: 5%; left: 40%;
      background: radial-gradient(circle, rgba(255,200,180,0.30) 0%, rgba(255,220,200,0.12) 60%, transparent 100%);
      animation: watercolour-drift-2 24s ease-in-out infinite reverse;
    }
    /* ensure content sits above canvas */
    .container { position: relative; z-index: 1; }

    @keyframes watercolour-drift {
      0%   { transform: translate(0%, 0%) scale(1);     opacity: 0.55; }
      25%  { transform: translate(8%, -12%) scale(1.15); opacity: 0.65; }
      50%  { transform: translate(-6%, 8%) scale(0.92);  opacity: 0.50; }
      75%  { transform: translate(10%, 5%) scale(1.08);  opacity: 0.60; }
      100% { transform: translate(0%, 0%) scale(1);     opacity: 0.55; }
    }
    @keyframes watercolour-drift-2 {
      0%   { transform: translate(0%, 0%) scale(1.1);   opacity: 0.45; }
      33%  { transform: translate(-10%, 6%) scale(0.9); opacity: 0.60; }
      66%  { transform: translate(7%, -8%) scale(1.2);  opacity: 0.40; }
      100% { transform: translate(0%, 0%) scale(1.1);   opacity: 0.45; }
    }
    @keyframes watercolour-drift-3 {
      0%   { transform: translate(0%, 0%) scale(0.95);  opacity: 0.50; }
      40%  { transform: translate(12%, 10%) scale(1.1); opacity: 0.65; }
      80%  { transform: translate(-8%, -5%) scale(1.0); opacity: 0.45; }
      100% { transform: translate(0%, 0%) scale(0.95);  opacity: 0.50; }
    }
    @keyframes bg-colour-shift {
      0%   { background-color: #f0eeff; }
      20%  { background-color: #e8f0ff; }
      40%  { background-color: #f5eaff; }
      60%  { background-color: #eef5ff; }
      80%  { background-color: #fceaff; }
      100% { background-color: #f0eeff; }
    }

  </style>
</head>
<body>

  <!-- WATERCOLOUR ANIMATION LAYER -->
  <div class="wc-canvas">
    <div class="wc-blob wc-blob-1"></div>
    <div class="wc-blob wc-blob-2"></div>
    <div class="wc-blob wc-blob-3"></div>
    <div class="wc-blob wc-blob-4"></div>
    <div class="wc-blob wc-blob-5"></div>
  </div>

  <div class="container">
    <div class="logo-area">
      <div class="brand-logos">
        <img src="/assets/5senses_logo.png" alt="정5SENSES" class="logo-5senses-img" />
        <div class="logo-divider"></div>
        <img src="/assets/simplex_ity_logo.png" alt="SIMPLEX-ITY" class="logo-simplexity" />
      </div>
      <p class="portal-tagline">Portal — Select your access</p>
    </div>
    <div class="portal-cards">
      <a href="/staff/index.html" class="portal-card">
        <div class="portal-icon staff-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#5e50fb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="portal-info">
          <h2>Staff Portal</h2>
          <p>Internal team access</p>
        </div>
        <div class="portal-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </a>
      <a href="/brand/index.html" class="portal-card">
        <div class="portal-icon brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3b7cf6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <div class="portal-info">
          <h2>Brand Portal</h2>
          <p>Brand partner access</p>
        </div>
        <div class="portal-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </a>
      <a href="/influencer/index.html" class="portal-card">
        <div class="portal-icon influencer-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#c060e0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 1 0 10 10"/>
            <path d="M12 8v4l3 3"/>
            <path d="M18 2l4 4-4 4"/>
            <path d="M22 2l-4 4"/>
          </svg>
        </div>
        <div class="portal-info">
          <h2>Influencer Portal</h2>
          <p>Creator & KOL access</p>
        </div>
        <div class="portal-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </a>
    </div>
    <div class="footer">
      5SENSESBEAUTY LIMITED · SIMPLEX-ITY · Powered by Simpee
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const STORAGE_KEY = 'portal_5senses_settings';
  const stored = localStorage.getItem(STORAGE_KEY);
  if (!stored) return;
  try {
    const s = JSON.parse(stored);

    // Background — force override hardcoded CSS
    if (s.bg_image_url && s.bg_image_url.trim() !== '') {
      document.body.setAttribute('style', 'background-image:url(' + s.bg_image_url + ');background-size:cover;background-position:center;');
    } else if (s.bg_gradient_from) {
      const mid = s.bg_gradient_mid || s.bg_gradient_from;
      const to = s.bg_gradient_to || s.bg_gradient_from;
      document.body.setAttribute('style', 'background:linear-gradient(135deg,' + s.bg_gradient_from + ',' + mid + ',' + to + ');');
    }

    // Title & subtitle
    const title = document.querySelector('.portal-tagline');
    if (title && s.subtitle) title.textContent = s.subtitle;

    const mainTitle = document.querySelector('.world-title');
    if (mainTitle && s.title) mainTitle.textContent = s.title;

    // Title color
    if (s.title_color && mainTitle) mainTitle.style.color = s.title_color;
    if (s.subtitle_color && title) title.style.color = s.subtitle_color;

    // Footer
    const footer = document.querySelector('.footer');
    if (footer && s.footer_text) footer.textContent = s.footer_text;

    // Portal card labels
    const cards = document.querySelectorAll('.portal-card');
    const labels = [
      { label: s.card_staff_label, desc: s.card_staff_desc },
      { label: s.card_brand_label, desc: s.card_brand_desc },
      { label: s.card_influencer_label, desc: s.card_influencer_desc }
    ];
    cards.forEach(function(card, i) {
      if (!labels[i]) return;
      const h2 = card.querySelector('h2');
      const p = card.querySelector('p');
      if (h2 && labels[i].label) h2.textContent = labels[i].label;
      if (p && labels[i].desc) p.textContent = labels[i].desc;
    });

    // Logos
    const logo5s = document.querySelector('.logo-5senses-img');
    const logoSx = document.querySelector('.logo-simplexity');
    if (logo5s && s.logo_5senses_url && s.logo_5senses_url.trim() !== '') {
      logo5s.src = s.logo_5senses_url;
    }
    if (logoSx && s.logo_simplexity_url && s.logo_simplexity_url.trim() !== '') {
      logoSx.src = s.logo_simplexity_url;
    }

  } catch(e) { console.warn('CMS load error:', e); }
});
</script>

</body>
</html>
