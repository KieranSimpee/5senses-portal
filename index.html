<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>정5SENSES × SIMPLEX-ITY Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Exo+2:wght@200;300;600&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    background: #fdf8f5;
    overflow-x: hidden;
  }

  /* === WATERCOLOUR BACKGROUND === */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg,
      rgba(255,210,190,0.55) 0%,
      rgba(240,185,210,0.45) 30%,
      rgba(200,185,235,0.50) 65%,
      rgba(185,210,245,0.40) 100%);
    animation: driftBg 12s ease-in-out infinite alternate;
  }
  @keyframes driftBg {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(15deg) brightness(1.05); }
  }

  /* watercolour blob accents */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
    animation: floatBlob 14s ease-in-out infinite alternate;
  }
  .blob-1 { width:420px; height:420px; background:#f7b8cc; top:-80px; left:-100px; animation-delay:0s; }
  .blob-2 { width:350px; height:350px; background:#c4b0f0; top:30%; right:-80px; animation-delay:-4s; }
  .blob-3 { width:300px; height:300px; background:#a8c8f8; bottom:-60px; left:30%; animation-delay:-8s; }
  @keyframes floatBlob {
    0%   { transform: translateY(0) scale(1); }
    100% { transform: translateY(-30px) scale(1.08); }
  }

  /* === MAIN LAYOUT === */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 40px 20px;
  }

  /* === LOGO ROW === */
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .logo-img-5senses {
    height: 72px;
    width: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 2px 8px rgba(139,118,118,0.15));
  }
  .logo-divider {
    width: 1px;
    height: 50px;
    background: rgba(139,118,118,0.25);
  }
  .logo-img-simplexity {
    height: 52px;
    width: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 2px 8px rgba(140,130,252,0.15));
  }

  /* === TAGLINE === */
  .tagline {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 4px;
    color: rgba(100,90,110,0.7);
    text-transform: uppercase;
    text-align: center;
    margin-top: -30px;
  }

  /* === PORTAL CARDS === */
  .portal-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  /* Each card is a hover zone */
  .portal-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* The label button */
  .portal-label {
    padding: 14px 36px;
    border: 1px solid rgba(139,118,118,0.3);
    border-radius: 40px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(80,70,80,0.75);
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(12px);
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    user-select: none;
  }
  .portal-label:hover,
  .portal-card:hover .portal-label {
    background: rgba(255,255,255,0.75);
    border-color: rgba(139,118,118,0.5);
    color: #5a4a5a;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(139,118,118,0.18);
  }

  /* The login panel — hidden by default, appears on hover */
  .login-panel {
    position: absolute;
    top: calc(100% + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    width: 300px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 28px 28px 24px;
    box-shadow: 0 20px 60px rgba(100,80,120,0.18);
    border: 1px solid rgba(255,255,255,0.8);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
  }
  .portal-card:hover .login-panel {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) translateY(0);
  }

  .login-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5a4a6a;
    margin-bottom: 4px;
    text-align: center;
  }
  .login-sub {
    font-size: 10px;
    color: rgba(120,100,130,0.6);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .login-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid rgba(200,190,220,0.6);
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    color: #4a3a5a;
    background: rgba(255,255,255,0.8);
    outline: none;
    margin-bottom: 10px;
    transition: border 0.2s;
  }
  .login-input:focus { border-color: #8c82fc; }
  .login-input::placeholder { color: rgba(160,140,170,0.7); }

  /* colour per portal */
  .btn-internal { background: linear-gradient(135deg, #8c82fc, #5e50fb); }
  .btn-brand    { background: linear-gradient(135deg, #f0a0b8, #e07898); }
  .btn-influencer { background: linear-gradient(135deg, #a0c8f0, #6098d0); }

  .login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .login-btn:hover { opacity:0.88; transform: translateY(-1px); }

  /* footer */
  .footer {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(120,100,130,0.45);
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="page">

  <!-- LOGOS -->
  <div class="logo-row">
    <img src="assets/5senses_logo.png" alt="정5SENSES" class="logo-img-5senses"/>
    <div class="logo-divider"></div>
    <img src="assets/simplexity_logo.png" alt="SIMPLEX-ITY" class="logo-img-simplexity"/>
  </div>

  <p class="tagline">The World of Equilibrium · Feel Beauty, Live Fully</p>

  <!-- PORTAL CARDS — hover to reveal login -->
  <div class="portal-row">

    <!-- INTERNAL -->
    <div class="portal-card">
      <div class="portal-label">Internal</div>
      <div class="login-panel">
        <div class="login-title">Staff Portal</div>
        <div class="login-sub">Internal team access only</div>
        <input class="login-input" type="email" placeholder="Email address"/>
        <input class="login-input" type="password" placeholder="Password"/>
        <button class="login-btn btn-internal" onclick="window.location.href='staff/index.html'">Enter →</button>
      </div>
    </div>

    <!-- BRAND -->
    <div class="portal-card">
      <div class="portal-label">Brand</div>
      <div class="login-panel">
        <div class="login-title">Brand Portal</div>
        <div class="login-sub">Authorised brand partners</div>
        <input class="login-input" type="email" placeholder="Brand email"/>
        <input class="login-input" type="password" placeholder="Password"/>
        <button class="login-btn btn-brand" onclick="window.location.href='brand/index.html'">Enter →</button>
      </div>
    </div>

    <!-- INFLUENCER -->
    <div class="portal-card">
      <div class="portal-label">Influencer</div>
      <div class="login-panel">
        <div class="login-title">Creator Portal</div>
        <div class="login-sub">Registered influencers & creators</div>
        <input class="login-input" type="email" placeholder="Creator email"/>
        <input class="login-input" type="password" placeholder="Password"/>
        <button class="login-btn btn-influencer" onclick="window.location.href='influencer/index.html'">Enter →</button>
      </div>
    </div>

  </div>

  <div class="footer">portal.5senses.global · secure access · 2026</div>

</div>
</body>
</html>
