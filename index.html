<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5SENSES · SIMPLEX-ITY Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── WATERCOLOUR BACKGROUND ── */
    .wc-canvas {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
      background: #ffffff;
    }
    .wc-blob {
      position: absolute;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%;
      filter: blur(50px);
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    .wc-blob-1 {
      width: 55vw; height: 45vw;
      top: 5%; left: -5%;
      background: radial-gradient(ellipse at 40% 50%,
        rgba(255,190,160,0.70) 0%, rgba(255,170,140,0.40) 45%, transparent 100%);
      border-radius: 62% 38% 55% 45% / 48% 62% 38% 52%;
      animation: wc-drift-1 20s ease-in-out infinite;
    }
    .wc-blob-2 {
      width: 50vw; height: 42vw;
      top: 15%; left: 25%;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(210,140,170,0.60) 0%, rgba(200,130,165,0.32) 48%, transparent 100%);
      border-radius: 55% 45% 60% 40% / 52% 48% 55% 45%;
      animation: wc-drift-2 25s ease-in-out infinite;
    }
    .wc-blob-3 {
      width: 52vw; height: 44vw;
      top: 5%; right: -8%;
      background: radial-gradient(ellipse at 60% 45%,
        rgba(180,175,230,0.65) 0%, rgba(165,160,220,0.35) 45%, transparent 100%);
      border-radius: 45% 55% 42% 58% / 55% 45% 58% 42%;
      animation: wc-drift-3 22s ease-in-out infinite;
    }
    .wc-blob-4 {
      width: 6vw; height: 6vw;
      top: 40%; left: 42%;
      background: radial-gradient(circle, rgba(200,130,165,0.50) 0%, transparent 70%);
      border-radius: 50%; filter: blur(14px);
      animation: wc-dot 18s ease-in-out infinite;
    }
    .wc-blob-5 {
      width: 4vw; height: 4vw;
      top: 20%; left: 62%;
      background: radial-gradient(circle, rgba(180,175,230,0.55) 0%, transparent 70%);
      border-radius: 50%; filter: blur(9px);
      animation: wc-dot 14s ease-in-out infinite reverse;
    }
    @keyframes wc-drift-1 {
      0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity:.80; }
      25%  { transform: translate(3%,-4%) scale(1.06) rotate(2deg); opacity:.90; }
      50%  { transform: translate(-2%,5%) scale(.96) rotate(-1deg); opacity:.72; }
      75%  { transform: translate(4%,2%) scale(1.03) rotate(1deg); opacity:.85; }
      100% { transform: translate(0,0) scale(1) rotate(0deg); opacity:.80; }
    }
    @keyframes wc-drift-2 {
      0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity:.72; }
      33%  { transform: translate(-4%,3%) scale(1.08) rotate(-2deg); opacity:.82; }
      66%  { transform: translate(3%,-5%) scale(.94) rotate(2deg); opacity:.62; }
      100% { transform: translate(0,0) scale(1) rotate(0deg); opacity:.72; }
    }
    @keyframes wc-drift-3 {
      0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity:.75; }
      35%  { transform: translate(-3%,-3%) scale(1.05) rotate(1deg); opacity:.85; }
      70%  { transform: translate(4%,4%) scale(.97) rotate(-2deg); opacity:.65; }
      100% { transform: translate(0,0) scale(1) rotate(0deg); opacity:.75; }
    }
    @keyframes wc-dot {
      0%   { opacity:.55; transform: translate(0,0) scale(1); }
      50%  { opacity:.75; transform: translate(8px,-10px) scale(1.2); }
      100% { opacity:.55; transform: translate(0,0) scale(1); }
    }

    /* ── MAIN CONTAINER ── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      padding: 48px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── LOGO AREA ── */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 8px;
    }

    .logo-divider {
      width: 1px;
      height: 52px;
      background: rgba(160,140,200,0.35);
      flex-shrink: 0;
    }


    /* ── TAGLINE ── */
    .portal-tagline {
      font-size: 10px;
      color: #a090b8;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 16px;
      margin-bottom: 36px;
      font-weight: 400;
    }

    /* ── PORTAL CARDS ── */
    .portal-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
    }
    .portal-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(180,160,220,0.25);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .portal-card:hover {
      background: rgba(255,255,255,0.90);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(140,130,252,0.15);
    }
    .portal-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .staff-icon  { background: rgba(237,233,255,0.90); }
    .brand-icon  { background: rgba(233,240,255,0.90); }
    .inf-icon    { background: rgba(252,233,255,0.90); }
    .portal-icon svg { width: 22px; height: 22px; }
    .portal-info { flex: 1; }
    .portal-name {
      font-size: 15px; font-weight: 600;
      color: #2a2040; line-height: 1.2;
    }
    .portal-desc {
      font-size: 12px; color: #8878a8;
      margin-top: 2px; font-weight: 400;
    }
    .portal-arrow { color: #c0b0e0; font-size: 18px; }

    /* ── FOOTER ── */
    .footer {
      font-size: 10px;
      color: #b8aad0;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
    }
  
    /* ── SVG TEXT LOGOS (always transparent) ── */
    .logo-5senses-text {
      display: flex; align-items: baseline; gap: 2px;
      font-family: 'Exo 2', sans-serif;
    }
    .logo-korean {
      font-size: 38px; font-weight: 300;
      color: #2a2040; line-height: 1;
    }
    .logo-5 {
      font-size: 32px; font-weight: 600;
      color: #5e50fb; line-height: 1;
    }
    .logo-senses {
      font-size: 13px; font-weight: 300;
      color: #2a2040; letter-spacing: 3px;
      align-self: flex-end; padding-bottom: 3px;
    }
    .logo-simplexity-text {
      font-family: 'Exo 2', sans-serif;
      font-size: 18px; font-weight: 300;
      letter-spacing: 5px; color: #2a2040;
      text-transform: uppercase;
    }
    .logo-dash { color: #8c82fc; }

  </style>
</head>
<body>

  <!-- WATERCOLOUR LAYER -->
  <div class="wc-canvas">
    <div class="wc-blob wc-blob-1"></div>
    <div class="wc-blob wc-blob-2"></div>
    <div class="wc-blob wc-blob-3"></div>
    <div class="wc-blob wc-blob-4"></div>
    <div class="wc-blob wc-blob-5"></div>
  </div>

  <div class="container">

    <!-- LOGOS -->
    <div class="logo-row">
      <div class="logo-5senses-text">
        <span class="logo-korean">정</span><span class="logo-5">5</span><span class="logo-senses">SENSES</span>
      </div>
      <div class="logo-divider"></div>
      <div class="logo-simplexity-text">SIMPLEX<span class="logo-dash">-</span>ITY</div>
    </div>

    <!-- TAGLINE -->
    <p class="portal-tagline">Portal — Select Your Access</p>

    <!-- PORTAL CARDS -->
    <div class="portal-list">
      <a href="/staff/" class="portal-card">
        <div class="portal-icon staff-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#7c6fcd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="portal-info">
          <div class="portal-name">Staff Portal</div>
          <div class="portal-desc">Internal team access</div>
        </div>
        <span class="portal-arrow">›</span>
      </a>

      <a href="/brand/" class="portal-card">
        <div class="portal-icon brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#5b7fcd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="portal-info">
          <div class="portal-name">Brand Portal</div>
          <div class="portal-desc">Brand partner access</div>
        </div>
        <span class="portal-arrow">›</span>
      </a>

      <a href="/influencer/" class="portal-card">
        <div class="portal-icon inf-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#a05fcd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/>
          </svg>
        </div>
        <div class="portal-info">
          <div class="portal-name">Influencer Portal</div>
          <div class="portal-desc">Creator &amp; KOL access</div>
        </div>
        <span class="portal-arrow">›</span>
      </a>
    </div>

    <div class="footer">5SENSESBEAUTY LIMITED · SIMPLEX-ITY · Powered by Simpee</div>
  </div>

</body>
</html>
