<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Staff Portal · 5SENSES</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat',sans-serif;min-height:100vh;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}

    /* ── ORGANIC SHAPES ── */
    .shape{position:fixed;border-radius:50%;opacity:0.55;}
    .s1{width:220px;height:220px;top:-60px;left:30%;background:linear-gradient(135deg,#c8c2ff,#a09bff);border-radius:50% 50% 50% 50%;}
    .s2{width:180px;height:180px;top:-40px;left:55%;background:#f0a898;border-radius:50%;}
    .s3{width:140px;height:140px;top:-20px;right:-20px;background:#d4b8ff;border-radius:50%;}
    .s4{width:160px;height:100px;bottom:20px;left:-20px;background:linear-gradient(135deg,#ffb3c6,#ff8fab);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;}
    .s5{width:130px;height:130px;bottom:30px;left:35%;background:#7dd4f0;border-radius:50% 0 50% 50%;}
    .s6{width:110px;height:110px;bottom:10px;right:5%;background:#b8aaff;border-radius:50% 50% 0 50%;}
    .dots{position:fixed;bottom:160px;right:8%;width:90px;height:90px;background-image:radial-gradient(#d0c8ff 1.5px,transparent 1.5px);background-size:10px 10px;opacity:0.5;}

    /* ── LOGIN CARD ── */
    .card{position:relative;z-index:10;width:100%;max-width:400px;padding:48px 40px;background:#fff;border-radius:24px;box-shadow:0 8px 48px rgba(140,130,200,0.12);}
    .portal-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#a090c0;text-decoration:none;margin-bottom:28px;letter-spacing:1px;}
    .portal-back:hover{color:#5e50fb;}
    .brand-mark{margin-bottom:24px;}
    .brand-mark .bm-korean{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:300;color:#2a2040;}
    .brand-mark .bm-5{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:600;color:#5e50fb;}
    .brand-mark .bm-senses{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:300;color:#2a2040;letter-spacing:3px;}
    h2{font-size:22px;font-weight:600;color:#1a1030;margin-bottom:6px;}
    .subtitle{font-size:12px;color:#9080b0;margin-bottom:32px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:11px;font-weight:600;color:#7060a0;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
    .field input{width:100%;padding:14px 16px;border:1.5px solid #e8e2f8;border-radius:12px;font-size:14px;font-family:'Montserrat',sans-serif;outline:none;transition:border 0.2s,box-shadow 0.2s;background:#faf9ff;color:#1a1030;}
    .field input:focus{border-color:#8c82fc;box-shadow:0 0 0 3px rgba(140,130,252,0.12);}
    .field input::placeholder{color:#c0b8d8;}
    .row-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .remember{display:flex;align-items:center;gap:8px;font-size:12px;color:#7060a0;cursor:pointer;}
    .remember input[type=checkbox]{accent-color:#8c82fc;width:15px;height:15px;}
    .forgot{font-size:12px;color:#8c82fc;text-decoration:none;}
    .forgot:hover{color:#5e50fb;}
    .btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#8c82fc,#5e50fb);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.5px;}
    .btn-login:hover{opacity:0.90;transform:translateY(-1px);}
    .portal-tag{text-align:center;margin-top:20px;font-size:11px;color:#b0a0d0;letter-spacing:2px;text-transform:uppercase;}
  </style>
</head>
<body>
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape s3"></div>
  <div class="shape s4"></div>
  <div class="shape s5"></div>
  <div class="shape s6"></div>
  <div class="dots"></div>

  <div class="card">
    <a href="/" class="portal-back">← All Portals</a>
    <div class="brand-mark">
      <span class="bm-korean">정</span><span class="bm-5">5</span><span class="bm-senses">SENSES</span>
    </div>
    <h2>Staff Login</h2>
    <p class="subtitle">Internal team access</p>
    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="your@5senses.global"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="Enter password"/>
    </div>
    <div class="row-meta">
      <label class="remember"><input type="checkbox" checked/> Keep me logged in</label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button class="btn-login" onclick="window.location.href='dashboard.html'">Login</button>
    <p class="portal-tag">Staff Portal · 5SENSESBEAUTY</p>
  </div>
</body>
</html>
