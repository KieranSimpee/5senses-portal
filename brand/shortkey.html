<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>shortkey Brand Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;min-height:100vh;background:#fafaf8;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    .grain{position:fixed;inset:0;z-index:0;opacity:0.5;background-image:repeating-linear-gradient(45deg,rgba(10,10,10,0.02) 0px,rgba(10,10,10,0.02) 1px,transparent 1px,transparent 46px);pointer-events:none;}
    .card{position:relative;z-index:10;width:100%;max-width:400px;padding:48px 40px;background:#fff;border:1.5px solid #0a0a0a;border-radius:4px;box-shadow:8px 8px 0 rgba(10,10,10,0.9);text-align:center;}
    .portal-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#8a8a8a;text-decoration:none;margin-bottom:26px;letter-spacing:1px;}
    .portal-back:hover{color:#0a0a0a;}
    .brand-mark img{height:42px;width:auto;object-fit:contain;margin-bottom:20px;}
    .login-badge{display:inline-block;background:#0a0a0a;color:#fff;font-size:10px;font-weight:700;padding:5px 13px;border-radius:20px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
    h2{font-family:'Archivo Black',sans-serif;font-size:22px;font-weight:400;color:#0a0a0a;margin-bottom:10px;letter-spacing:-0.5px;}
    .subtitle{font-size:13px;color:#8a8a8a;margin-bottom:26px;line-height:1.6;}
    .powered{text-align:center;margin-top:22px;font-size:10px;color:#8a8a8a;letter-spacing:1px;text-transform:uppercase;}
    .powered b{color:#0a0a0a;}
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="card">
    <a href="/brand/" class="portal-back">← Our Brands</a>
    <div class="brand-mark"><img src="https://base44.app/api/apps/69ddc914cfcf229762ac123d/files/mp/public/69ddc914cfcf229762ac123d/c4fa5572a_shortkey_logo_FINAL_darkink_transparent.png" alt="shortkey"/></div>
    <span class="login-badge">Coming Soon</span>
    <h2>Retail &amp; Style Partners</h2>
    <p class="subtitle">shortkey's consumer style-sharing network is launching soon. Retail and creator partnerships will open here first.</p>
    <p class="powered">Powered by <b>Simplex-ity</b></p>
  </div>
</body>
</html>
