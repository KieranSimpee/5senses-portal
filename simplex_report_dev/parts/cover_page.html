<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplex-ity — Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:100%; min-height:100vh;
  background:#8c82fc;
  font-family:'Montserrat',sans-serif;
  display:flex; align-items:center; justify-content:center;
}
.cover-page {
  width:900px; min-height:100vh;
  background:#8c82fc;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:80px 60px;
}
.logo-wrap {
  margin-bottom:48px;
  display:flex; flex-direction:column;
  align-items:center; gap:10px;
}
.logo-svg { width:52px; height:62px; }
.logo-wordmark {
  font-family:'Exo',sans-serif;
  font-weight:500; font-size:15px;
  letter-spacing:0.35em; color:#ffffff; opacity:0.95;
}
.logo-tagline {
  font-family:'Montserrat',sans-serif;
  font-weight:300; font-size:8.5px;
  letter-spacing:0.22em; color:rgba(255,255,255,0.60);
  text-transform:uppercase;
}
.divider {
  width:48px; height:1.5px;
  background:rgba(255,255,255,0.35);
  margin:0 auto 40px;
}
.doc-label {
  font-family:'Montserrat',sans-serif;
  font-weight:500; font-size:10px;
  letter-spacing:0.3em; color:rgba(255,255,255,0.60);
  text-transform:uppercase; margin-bottom:20px;
}
.doc-title {
  font-family:'Exo',sans-serif;
  font-weight:300; font-size:52px;
  line-height:1.15; color:#ffffff;
  text-align:center; margin-bottom:20px;
}
.doc-subtitle {
  font-family:'Montserrat',sans-serif;
  font-weight:300; font-size:13px;
  letter-spacing:0.2em; color:rgba(255,255,255,0.70);
  text-align:center; text-transform:uppercase;
  margin-bottom:64px;
}
.meta-grid {
  display:flex; gap:64px; margin-bottom:64px;
}
.meta-item {
  display:flex; flex-direction:column;
  align-items:center; gap:8px;
}
.meta-label {
  font-family:'Montserrat',sans-serif;
  font-size:9px; font-weight:500;
  letter-spacing:0.25em; color:rgba(255,255,255,0.55);
  text-transform:uppercase;
}
.meta-value {
  font-family:'Exo',sans-serif;
  font-size:16px; font-weight:400;
  color:#ffffff; letter-spacing:0.05em;
}
.footer-badge {
  border:1px solid rgba(255,255,255,0.28);
  border-radius:2px; padding:10px 32px;
  font-family:'Montserrat',sans-serif;
  font-size:9px; font-weight:500;
  letter-spacing:0.3em; color:rgba(255,255,255,0.55);
  text-transform:uppercase;
}
</style>
</head>
<body>
<div class="cover-page">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 52 62" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="22" r="19" stroke="white" stroke-width="1.6" fill="none" opacity="0.92"/>
      <line x1="26" y1="41" x2="26" y2="61" stroke="white" stroke-width="1.6" opacity="0.92"/>
      <line x1="26" y1="52" x2="15" y2="44" stroke="white" stroke-width="1.4" opacity="0.70"/>
      <line x1="26" y1="47" x2="37" y2="40" stroke="white" stroke-width="1.4" opacity="0.70"/>
      <line x1="26" y1="22" x2="17" y2="13" stroke="white" stroke-width="1.4" opacity="0.70"/>
      <line x1="26" y1="22" x2="35" y2="13" stroke="white" stroke-width="1.4" opacity="0.70"/>
      <line x1="26" y1="28" x2="19" y2="22" stroke="white" stroke-width="1.3" opacity="0.55"/>
      <line x1="26" y1="28" x2="33" y2="22" stroke="white" stroke-width="1.3" opacity="0.55"/>
    </svg>
    <div class="logo-wordmark">SIMPLEX-ITY</div>
    <div class="logo-tagline">One Stop Asian Beauty · Simplify to Amplify</div>
  </div>
  <div class="divider"></div>
  <div class="doc-label">Confidential &amp; Proprietary</div>
  <div class="doc-title">Master Reference<br>Document</div>
  <div class="doc-subtitle">Report Framework · Pricing · Brand Intelligence Architecture</div>
  <div class="meta-grid">
    <div class="meta-item">
      <div class="meta-label">Version</div>
      <div class="meta-value">v1.0 Locked</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Date</div>
      <div class="meta-value">June 2026</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Currency</div>
      <div class="meta-value">USD</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Status</div>
      <div class="meta-value">Active</div>
    </div>
  </div>
  <div class="footer-badge">Internal Use Only · Not for Distribution</div>
</div>
</body>
</html>
